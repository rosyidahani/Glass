name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Glass Module
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "Pull kode terbaru..."
            cd ~/odoo-glass/addons
            git pull origin main

            echo "Upgrade Odoo modules..."
            docker exec odoo-glass-odoo-1 odoo \
              -d odoo_glass \
              -u custom_web,feature_dosen,mahasiswa,mata_kuliah,presensi,tugas,shop \
              --stop-after-init \
              --no-http

            echo "Restart container..."
            docker restart odoo-glass-odoo-1

            echo "Deploy selesai!"
