name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Glass Module
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "Masuk ke folder project..."
            cd /root/odoo-glass/addons

            echo "Mengambil update terbaru dari GitHub..."
            git pull origin main

            echo "Upgrade module Odoo..."
            docker exec odoo-glass-odoo-1 odoo \
              -d odoo_glass \
              -u custom_web,feature_dosen,mahasiswa,mata_kuliah,presensi,tugas,shop \
              --stop-after-init \
              --no-http

            echo "Restart container Odoo..."
            docker restart odoo-glass-odoo-1

            echo "Deploy selesai!"
